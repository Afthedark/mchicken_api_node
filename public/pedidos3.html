<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Filtrados - Mama Chicken</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/pedidos2.css">
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="gestorPedidos(true)">
    <div class="container py-4">
        <div class="header-responsive d-flex flex-column flex-sm-row justify-content-between align-items-stretch align-items-sm-center mb-4 gap-2 gap-sm-0">
            <h1 class="mb-0 main-title text-center text-sm-start w-100 w-sm-auto">
                <i class="fas fa-utensils me-2"></i> Pedidos a Preparar (Filtrados)
            </h1>
            <span id="ultimaActualizacion" class="ultima-actualizacion-ui text-center text-sm-start w-100 w-sm-auto">
                <!-- El JS coloca aquí la fecha -->
            </span>
            <button class="btn btn-light shadow-sm px-2 py-2 ms-0 ms-sm-2 w-100 w-sm-auto" title="Ajustes" data-bs-toggle="modal" data-bs-target="#ajustesModal">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <div class="row">
            <template x-if="todosLosPedidos.length === 0">
                <div class="alert alert-info w-100">No hay pedidos para mostrar o los filtros están excluyendo todo.</div>
            </template>
            
            <template x-for="(pedido, index) in pedidosPaginados" :key="pedido.idUnico">
                <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2" :id="'pedido-'+pedido.idUnico" x-transition.duration.500ms>
                    <div class="pedido-card hover-simple" :class="pedido.claseAtraso">
                        <div class="pedido-header" :class="pedido.headerClass">
                            #<span x-text="filtroHoyActivo ? (+index + 1 + (paginaActual-1)*pedidosPorPagina) : pedido.facturaId"></span>
                        </div>
                        
                        <div class="cliente-header-section">
                            <h5 class="cliente-nombre">
                                <i class="fas fa-user-circle"></i> <span x-text="pedido.clienteDisplay"></span>
                            </h5>
                        </div>
            
                        <div class="pedido-body-content">
                            <div class="productos-container">
                                <template x-for="prod in pedido.productosParsed" :key="prod.id">
                                    <div class="producto-item-modern">
                                        <div class="producto-cantidad-modern" x-text="prod.cant"></div>
                                        <div class="producto-detalle">
                                            <div class="producto-nombre-modern" x-text="prod.name"></div>
                                            <template x-if="prod.obs">
                                                <div class="producto-observacion" x-text="prod.obs"></div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="pedido.productosParsed.length === 0">
                                    <div class="producto-item-modern justify-content-center text-center p-3" style="background: transparent; border: 2px dashed #ffcdd2; color: #d32f2f;">
                                        <div>
                                            <div class="fw-bold" style="font-size: 0.95rem;">
                                                <i class="fas fa-exclamation-triangle me-1"></i> SIN PRODUCTOS REGISTRADOS
                                            </div>
                                            <div style="font-size: 0.75rem; color: #e57373;">(Orden enviada vacía desde caja)</div>
                                        </div>
                                    </div>
                                </template>
                            </div>
            
                            <div class="tipo-pedido-badge">
                                <i class="fas fa-shopping-bag"></i> <span x-text="pedido.tipoPedidoTexto"></span>
                            </div>
                            
                            <template x-if="pedido.obsGeneral">
                                <div class="obs-general-box">
                                    <div class="obs-general-title"><i class="fas fa-comment-alt"></i> OBSERVACIÓN GENERAL</div>
                                    <p class="obs-general-text" x-text="pedido.obsGeneral"></p>
                                </div>
                            </template>
                            
                            <button class="btn-completar-modern" @click="marcarPedidoCompletado(pedido.idUnico)">
                                <i class="fas fa-check"></i> COMPLETADO
                            </button>
            
                            <div class="text-center mt-3 text-muted" style="font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px;">
                                <i class="far fa-clock"></i> <span x-text="pedido.fechaFormateada"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="mt-4" x-show="totalPaginas > 1">
            <nav aria-label="Paginador de pedidos">
                <ul class="pagination justify-content-center align-items-center">
                    <li class="page-item" :class="{'disabled': paginaActual === 1}">
                        <button class="page-link" @click="paginaActual > 1 && paginaActual--">Anterior</button>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link" x-text="'Página ' + paginaActual + ' de ' + totalPaginas"></span>
                    </li>
                    <li class="page-item">
                        <select class="form-select form-select-sm mx-2 paginador-select-inline" x-model="paginaActual" @change="seleccionarPagina($event.target.value)">
                            <template x-for="p in paginasArray" :key="p">
                                <option :value="p" x-text="p"></option>
                            </template>
                        </select>
                    </li>
                    <li class="page-item" :class="{'disabled': paginaActual === totalPaginas}">
                        <button class="page-link" @click="paginaActual < totalPaginas && paginaActual++">Siguiente</button>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Modal de Ajustes -->
        <div class="modal fade" id="ajustesModal" tabindex="-1" aria-labelledby="ajustesModalLabel" aria-hidden="true" x-data="{ clave: '', auth: false, error: false}">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="ajustesModalLabel"><i class="fas fa-cog me-2"></i>Ajustes</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" @click="auth = false; clave = ''"></button>
              </div>
              <div class="modal-body">
                <div x-show="!auth">
                  <label class="form-label">Ingrese contraseña para acceder a los ajustes:</label>
                  <div class="input-group mb-2" x-data="{ showPw: false }">
                    <input :type="showPw ? 'text' : 'password'" class="form-control" x-model="clave" @keyup.enter="clave === 'dev2512++' ? auth = true : (error = true, clave = '')" placeholder="Contraseña">
                    <button class="btn btn-outline-secondary" type="button" @click="showPw = !showPw" title="Mostrar/Ocultar contraseña">
                      <i class="fas" :class="showPw ? 'fa-eye-slash' : 'fa-eye'" style="color:#6c757d;"></i>
                    </button>
                  </div>
                  <div class="text-danger mb-2" x-show="error">Contraseña incorrecta</div>
                  <button type="button" class="btn btn-primary w-100" @click="clave === 'dev2512++' ? auth = true : (error = true, clave = '')">Acceder</button>
                </div>
                <div x-show="auth">
                  <div class="mb-3">
                    <label class="form-label">Filtrar pedidos del día (En Adelante)</label>
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" :checked="filtroHoyActivo" @change="toggleFiltroHoy()">
                      <label class="form-check-label">Mostrar solo pedidos de hoy</label>
                    </div>
                  </div>
                  <hr>
                  <div class="mb-3">
                    <label class="form-label fw-bold"><i class="fas fa-filter me-1"></i> Administración de Filtro de Productos</label>
                    <p class="text-muted small mb-2">Ingrese los nombres de los productos a filtrar (uno por línea). Solo los pedidos que contengan al menos uno de estos productos serán mostrados.</p>
                    <textarea class="form-control mb-2" x-model="filtroTexto" rows="6"></textarea>
                    <button type="button" class="btn btn-success w-100" @click="guardarFiltros()" :disabled="guardando">
                      <span x-show="!guardando"><i class="fas fa-save me-1"></i> Guardar Filtros</span>
                      <span x-show="guardando"><i class="fas fa-spinner fa-spin me-1"></i> Guardando...</span>
                    </button>
                    <div x-show="msgFiltros.show" x-html="msgFiltros.text" :class="msgFiltros.class" class="mt-2 text-center" style="font-size:0.9em;" x-transition></div>
                  </div>
                  <hr>
                  <div class="mb-3">
                    <label class="form-label">Limpiar memoria localStorage automáticamente</label>
                    <div class="form-check form-switch">
                      <input class="form-check-input" type="checkbox" disabled checked>
                      <label class="form-check-label">Limpiar memoria cada día a las 12 am</label>
                    </div>
                  </div>
                  <hr>
                  <div class="mb-3">
                    <label class="form-label">Link de esta Pantalla</label>
                    <div class="input-group">
                      <input type="text" class="form-control" x-model="linkActual" readonly>
                      <button class="btn btn-outline-primary" type="button" @click="copiarTexto(linkActual, $el)" title="Copiar enlace">
                        <i class="fas fa-copy"></i>
                      </button>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">IP del Servidor (Red Local)</label>
                    <div class="input-group">
                      <input type="text" class="form-control" x-model="ipServidor" readonly>
                      <button class="btn btn-outline-primary" type="button" @click="copiarTexto(ipServidor, $el)" title="Copiar IP">
                        <i class="fas fa-copy"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" @click="auth = false; clave = ''">Cerrar</button>
              </div>
            </div>
          </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/pedidos-manager.js"></script>
    
    <div id="probarSonidoContainer">
        <span x-show="textoSonidoAyuda">Para recibir alertas, <b>active el sonido aquí</b> <i class="fas fa-arrow-down"></i></span>
        <button id="btnProbarSonido" title="Probar sonido de alerta" @click="probarSonido()" :class="{'sonido-activado': !textoSonidoAyuda}">
            <i class="fas" :class="textoSonidoAyuda ? 'fa-volume-up' : 'fa-check-circle'"></i>
            <span x-text="textoSonidoAyuda ? 'Activar Sonido' : 'Sonido Activado'"></span>
        </button>
    </div>
    <audio id="alertaAudio" preload="auto"></audio>
    <audio id="alertaAudioTest" src="/assets/sounds/notificaciones.mp3" preload="auto"></audio>
</body>
</html>
